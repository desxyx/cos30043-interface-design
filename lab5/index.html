<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwinTech</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <!-- <style>
        .grid-demo {
            background-color: #e7f1ff;
            : 1px solid #b6d4fe;
            padding: 12px;
            margin-bottom: 10px;
            text-align: center;
            -radius: 4px;
        }
    </style> -->
</head>

<body>
    <header class="topbar">
        <div class="site-logo">
            <img src="./assets/logo/logo.png" alt="Site Logo">
        </div>

        <nav class="navrow">
            <ul>
                <li>
                    <a href="https://www.swinburne.edu.au/" target="_blank" rel="noopener noreferrer">Swinburne</a>
                </li>
                <li>
                    <a href="https://www.melbourne.vic.gov.au/" target="_blank" rel="noopener noreferrer">Melbourne</a>
                </li>
                <li>
                    <a href="https://www.vic.gov.au/" target="_blank" rel="noopener noreferrer">Victoria</a>
                </li>
                <li>
                    <a href="https://my.gov.au/" target="_blank" rel="noopener noreferrer">Australia</a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="container py-5">
        <div id="app">
            <div class="row g-4">
                <div class="col-12">
                    <div class="card shadow-sm border-0">
                        <div class="card-body">
                            <h1 class="h2 mb-3">Lab 05 Components and Router</h1>
                            <p class="mb-0">
                                This web application contains two sections: <strong>Job Explorer</strong> and
                                <strong>To-Do List</strong>.
                            </p>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <job-list v-bind:jobs="jobs"></job-list>
                </div>

                <div class="col-lg-8">
                    <div v-if="isLoading" class="alert alert-info mb-0">
                        Loading jobs from jobs.txt...
                    </div>

                    <div v-else-if="loadError" class="alert alert-danger mb-0">
                        {{ loadError }}
                    </div>

                    <router-view v-else></router-view>
                </div>

                <div class="col-12">
                    <to-do-list></to-do-list>
                </div>
            </div>
        </div>
    </main>

    <footer>

        <div class="footer-top">

            <div class="footer-links">
                <ul>
                    <li><a href="#">Privacy Policy</a></li>
                    <li><a href="#">Disclaimer</a></li>
                    <li><a href="#">Terms of Service</a></li>
                </ul>
            </div>

            <div class="footer-social">
                <a href="#"><img src="./assets/images/facebook.svg" alt="Facebook"></a>
                <a href="#"><img src="./assets/images/github.svg" alt="GitHub"></a>
                <a href="#"><img src="./assets/images/x.svg" alt="X"></a>
            </div>

        </div>

        <div class="footer-bottom">
            <p>@swintech 2026</p>
        </div>

    </footer>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://unpkg.com/vue-router@4"></script>
<script src="./js/main.js"></script>

</html>
