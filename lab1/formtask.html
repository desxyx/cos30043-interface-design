<!DOCTYPE html>
<html lang="en">

<head>
        <title>WAI Form Task</title>
        <meta charset="utf-8" />
        <meta name="language" content="english" />
        <meta name="keywords" content="Accessibility,Lab,Tasks" />
        <meta name="description" content="WAI Form Task" />
        <style>
                .sr-only {
                        position: absolute;
                        width: 1px;
                        height: 1px;
                        padding: 0;
                        margin: -1px;
                        overflow: hidden;
                        clip: rect(0, 0, 0, 0);
                        white-space: nowrap;
                        border-width: 0;
                }

                fieldset {
                        border: none;
                }
        </style>
</head>

<body>
        <h1>WAI Form Example</h1>
        <form method="post" action="http://mercury.swin.edu.au/it000000/formtest.php">
                <fieldset>
                        <legend>Contact Information </legend>
                        <p>
                                <label for="cname">Name:</label>
                                <input type="text" name="cname" id="cname" />
                        </p>
                        <p>
                                <label for="cemail">E-mail Address:</label>
                                <input type="text" name="cemail" id="cemail" />
                        </p>
                        <p>
                                <label for="caddr"> Mailing Address:</label><br />
                                <textarea name="caddr" id="caddr" rows="4" cols="40"></textarea>
                        </p>
                        <p>Credit Card Information</p>

                        <p>
                                <label for="cvisa">
                                        <input type="radio" name="card" id="cvisa" value="visa">
                                        Visa
                                </label>

                                <label for="cmc">
                                        <input type="radio" name="card" id="cmc" value="mc">
                                        MasterCard
                                </label>
                        </p>
                        <p>
                                <label for="cnumber">Number: </label>
                                <input type="text" name="number" id="cnumber" /><br />
                                <label for="cexpiry">Expiry: </label>
                                <input type="text" name="expiry" id="cexpiry" />
                        </p>
                        <p>
                                <label for="submitbtn" class="sr-only">Submit order</label>
                                <input type="submit" id="submitbtn" value="Submit order" />

                                <label for="resetbtn" class="sr-only">Clear order</label>
                                <input type="reset" id="resetbtn" value="Clear order" />
                        </p>

                </fieldset>
        </form>
</body>

</html>
